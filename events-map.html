---
layout: null
---
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Center City Events This Week</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; display: flex; flex-direction: column; }
    header { padding: 12px 20px; border-bottom: 1px solid #1a1a1a; display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; gap: 12px; }
    h1 { font-size: 1.1rem; font-weight: 600; }
    .meta { color: #888; font-size: 0.85rem; }
    .filters { display: flex; gap: 6px; flex-wrap: wrap; padding: 10px 20px; border-bottom: 1px solid #1a1a1a; align-items: center; }
    .filter-label { color: #666; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; margin-right: 4px; }
    .pill { background: #1a1a1a; border: 1px solid #333; color: #aaa; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; cursor: pointer; transition: all 0.15s; }
    .pill:hover { border-color: #666; color: #ddd; }
    .pill.active { background: #2a4a2a; border-color: #4a8a4a; color: #8f8; }
    #map { flex: 1; background: #111; }
    .leaflet-popup-content-wrapper { background: #1a1a1a; color: #e0e0e0; border-radius: 8px; }
    .leaflet-popup-tip { background: #1a1a1a; }
    .leaflet-popup-content { margin: 12px 14px; font-size: 0.85rem; min-width: 220px; max-width: 320px; }
    .popup-title { font-weight: 600; color: #fff; margin-bottom: 6px; line-height: 1.3; }
    .popup-meta { color: #888; font-size: 0.78rem; margin-bottom: 4px; }
    .popup-venue { color: #aac; font-size: 0.78rem; margin-bottom: 8px; }
    .popup-desc { color: #bbb; font-size: 0.8rem; line-height: 1.4; margin-bottom: 8px; max-height: 100px; overflow-y: auto; }
    .popup-link { color: #6af36a; text-decoration: none; font-size: 0.8rem; }
    .popup-link:hover { text-decoration: underline; }
    a.toplink { color: #6af36a; text-decoration: none; font-size: 0.85rem; }
    a.toplink:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Center City Events <span class="meta" id="week-label">— this week</span></h1>
    </div>
    <div class="meta" id="stats">Loading…</div>
    <a href="/events.html" class="toplink">← list view</a>
  </header>
  <div class="filters" id="source-filters"><span class="filter-label">Source:</span></div>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // Center City bbox: Schuylkill → Delaware, Vine → South
    const BBOX = { latMin: 39.943, latMax: 39.962, lngMin: -75.180, lngMax: -75.140 };

    const SOURCE_COLORS = {
      "Campus Philly": "#ff9966",
      "University City": "#66ccff",
      "Bartram's Garden": "#88dd88",
      "Philly Family": "#ffcc66",
      "Schuylkill Center": "#aaff88",
      "NKCDC": "#cc99ff",
      "NextFab": "#ff99cc",
      "Penn Today": "#99ddff",
      "Free Library": "#ddaa66",
      "Ticketmaster": "#ff6699",
    };

    const center = [(BBOX.latMin + BBOX.latMax) / 2, (BBOX.lngMin + BBOX.lngMax) / 2];
    const map = L.map('map', { zoomControl: true, scrollWheelZoom: true })
      .setView(center, 15);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '© OpenStreetMap contributors © CARTO',
      subdomains: 'abcd',
      maxZoom: 19,
    }).addTo(map);

    // Draw bbox outline
    L.rectangle(
      [[BBOX.latMin, BBOX.lngMin], [BBOX.latMax, BBOX.lngMax]],
      { color: '#4a8a4a', weight: 1, fill: false, dashArray: '4 4' }
    ).addTo(map);

    let markers = [];
    let allEvents = [];
    const activeSources = new Set();

    function colorIcon(color) {
      return L.divIcon({
        className: 'event-marker',
        html: `<div style="background:${color};width:18px;height:18px;border-radius:50%;border:3px solid #0a0a0a;box-shadow:0 0 0 2px ${color},0 2px 6px rgba(0,0,0,0.6)"></div>`,
        iconSize: [18, 18],
        iconAnchor: [9, 9],
      });
    }

    function escapeHtml(s) {
      return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function popupHtml(e) {
      const time = e.time && e.time !== '00:00' ? ` ${e.time}` : '';
      const dateStr = `${e.date}${time}`;
      const desc = e.description ? `<div class="popup-desc">${escapeHtml(e.description)}</div>` : '';
      const link = e.url ? `<a class="popup-link" href="${e.url}" target="_blank" rel="noopener">Details →</a>` : '';
      const cost = e.cost ? ` · ${escapeHtml(e.cost)}` : '';
      const color = SOURCE_COLORS[e.source] || '#888';
      return `
        <div class="popup-title">${escapeHtml(e.name)}</div>
        <div class="popup-meta">${dateStr}${cost} · <span style="color:${color}">${escapeHtml(e.source)}</span></div>
        <div class="popup-venue">📍 ${escapeHtml(e.venue || 'TBD')}</div>
        ${desc}
        ${link}
      `;
    }

    function render() {
      markers.forEach(m => map.removeLayer(m));
      markers = [];
      let shown = 0;
      for (const e of allEvents) {
        if (!e.lat || !e.lng) continue;
        if (activeSources.size && !activeSources.has(e.source)) continue;
        const m = L.marker([e.lat, e.lng], { icon: colorIcon(SOURCE_COLORS[e.source] || '#888') });
        m.bindPopup(popupHtml(e));
        m.addTo(map);
        markers.push(m);
        shown++;
      }
      document.getElementById('stats').textContent = `${shown} events shown`;
    }

    function buildFilters() {
      const counts = {};
      for (const e of allEvents) {
        counts[e.source] = (counts[e.source] || 0) + 1;
      }
      const bar = document.getElementById('source-filters');
      const allBtn = document.createElement('span');
      allBtn.className = 'pill active';
      allBtn.textContent = `all (${allEvents.length})`;
      allBtn.onclick = () => {
        activeSources.clear();
        document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
        allBtn.classList.add('active');
        render();
      };
      bar.appendChild(allBtn);

      Object.entries(counts).sort((a,b) => b[1]-a[1]).forEach(([source, n]) => {
        const pill = document.createElement('span');
        pill.className = 'pill';
        pill.style.borderColor = SOURCE_COLORS[source] || '#333';
        pill.textContent = `${source} (${n})`;
        pill.onclick = () => {
          allBtn.classList.remove('active');
          if (activeSources.has(source)) {
            activeSources.delete(source);
            pill.classList.remove('active');
          } else {
            activeSources.add(source);
            pill.classList.add('active');
          }
          if (activeSources.size === 0) allBtn.classList.add('active');
          render();
        };
        bar.appendChild(pill);
      });
    }

    fetch('/assets/data/events-week.json?v=' + Date.now())
      .then(r => r.json())
      .then(data => {
        allEvents = data.events || [];
        document.getElementById('week-label').textContent = `— ${data.week}`;
        buildFilters();
        render();
        // Lock view to bbox
        map.fitBounds([[BBOX.latMin, BBOX.lngMin], [BBOX.latMax, BBOX.lngMax]], { padding: [20, 20] });
      })
      .catch(err => {
        document.getElementById('stats').textContent = 'Error loading events: ' + err.message;
      });
  </script>
</body>
</html>
